<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conversor de Unidades y Monedas</title>
    <link rel="stylesheet" href="Style/conversor.css">
</head>
<body>

    <div class="contenedor">
        <h1>Conversor de Unidades y Monedas</h1>

        <label for="tipo-conversion">Tipo de conversion:</label>
        <select id="tipo-conversion">
            <option value="unidad">Unidad</option>
            <option value="moneda">Moneda</option>
        </select>

        <div id="grupo-categoria">
            <label for="categoria">Categoria:</label>
            <select id="categoria"></select>
        </div>

        <label for="valor">Valor:</label>
        <input type="number" id="valor" placeholder="Ingrese un valor">

        <label for="origen" id="label-origen">Unidad origen:</label>
        <select id="origen"></select>

        <label for="destino" id="label-destino">Unidad destino:</label>
        <select id="destino"></select>

        <button onclick="convertir()">Convertir</button>

        <h2 id="resultado">Resultado:</h2>
        <p id="fuente-monedas"></p>
    </div>

    <script src="Src/unidades.js"></script>
    <script src="Src/conversiones.js"></script>
    <script src="Src/softwaremini.js"></script>
</body>
</html>
