<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conversor de Unidades</title>
    <link rel="stylesheet" href="Style/conversor.css">
</head>
<body>
    <div class="contenedor">
        <h<h1>Conversor de Unidades</h1>

    <label>Categoría:</label>
    <select id="categoria" onchange="mostrarUnidades()">
        <option value="longitud">Longitud</option>
        <option value="masa">Masa</option>
        <option value="tiempo">Tiempo</option>
        <option value="temperatura">Temperatura</option>
        <option value="area">Área</option>
        <option value="volumen">Volumen</option>
        <option value="velocidad">Velocidad</option>
        <option value="presion">Presión</option>
        <option value="energia">Energía</option>
        <option value="potencia">Potencia</option>
        <option value="fuerza">Fuerza</option>
        <option value="frecuencia">Frecuencia</option>
        <option value="datos">Datos Informáticos</option>
        <option value="corriente">Corriente Eléctrica</option>
        <option value="voltaje">Voltaje</option>
        <option value="resistencia">Resistencia Eléctrica</option>
        <option value="angulo">Ángulo</option>
        <option value="consumo_combustible">Consumo de Combustible</option>
    </select>

    <label>Valor:</label>
        <input type="number" id="valor" placeholder="Ingrese un valor">

        <label>Unidad origen:</label>
        <select id="origen"></select>

        <label>Unidad destino:</label>
        <select id="destino"></select>

        <button onclick="convertir()">Convertir</button>

        <h2 id="resultado">Resultado:</h2>
    </div>

    <script src="Src/unidades.js"></script>
    <script src="Src/conversiones.js"></script>
    <script src="Src/softwaremini.js"></script>
</body>
</html>
